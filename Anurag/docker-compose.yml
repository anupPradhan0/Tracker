services:
  postgres:
    image: postgres:16-alpine
    container_name: anurag-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: anurag
      POSTGRES_PASSWORD: anurag_dev
      POSTGRES_DB: expense_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
